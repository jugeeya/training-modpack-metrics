<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ultimate Training Modpack — Users and Sessions by Date</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
        --devices: #f85149;
        --sessions: #58a6ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 2rem 1rem;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
      }
      h1 {
        font-size: 1.4rem;
        font-weight: 600;
        margin: 0 0 0.25rem;
      }
      p.subtitle {
        margin: 0 0 1.5rem;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.25rem;
      }
      .chart-wrap {
        position: relative;
        height: 60vh;
        min-height: 360px;
      }
      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .stat {
        flex: 1 1 160px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem 1.25rem;
      }
      .stat .label {
        color: var(--muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .stat .value {
        font-size: 1.6rem;
        font-weight: 700;
        margin-top: 0.25rem;
      }
      #status {
        color: var(--muted);
        font-size: 0.9rem;
        text-align: center;
        padding: 2rem;
      }
      footer {
        margin-top: 1.5rem;
        color: var(--muted);
        font-size: 0.8rem;
        text-align: center;
      }
      a { color: var(--sessions); }
    </style>
  </head>
  <body>
    <main>
      <h1>Ultimate Training Modpack — Users and Sessions by Date</h1>
      <p class="subtitle">Daily unique devices and sessions, aggregated from menu-open analytics.</p>

      <div class="stats" id="stats" hidden>
        <div class="stat">
          <div class="label">Latest day — devices</div>
          <div class="value" id="stat-devices" style="color: var(--devices)">—</div>
        </div>
        <div class="stat">
          <div class="label">Latest day — sessions</div>
          <div class="value" id="stat-sessions" style="color: var(--sessions)">—</div>
        </div>
        <div class="stat">
          <div class="label">Total events tracked</div>
          <div class="value" id="stat-events">—</div>
        </div>
      </div>

      <div class="panel">
        <div class="chart-wrap">
          <canvas id="chart"></canvas>
        </div>
        <div id="status">Loading data…</div>
      </div>

      <footer>
        <a href="https://github.com/jugeeya/UltimateTrainingModpack">Ultimate Training Modpack on GitHub</a>
        · Updated daily via GitHub Actions
        · <a href="./data/daily_metrics.json">raw data</a>
      </footer>
    </main>

    <script>
      const COLORS = { devices: "#f85149", sessions: "#58a6ff" };

      async function load() {
        const status = document.getElementById("status");
        let rows;
        try {
          const res = await fetch("./data/daily_metrics.json", { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          rows = await res.json();
        } catch (err) {
          status.textContent = `Failed to load data: ${err.message}`;
          return;
        }

        if (!Array.isArray(rows) || rows.length === 0) {
          status.textContent = "No data yet. The daily aggregation has not produced any records.";
          return;
        }

        rows.sort((a, b) => a.date.localeCompare(b.date));
        status.hidden = true;

        renderStats(rows);
        renderChart(rows);
      }

      function renderStats(rows) {
        const latest = rows[rows.length - 1];
        const totalEvents = rows.reduce((sum, r) => sum + (r.num_events || 0), 0);
        document.getElementById("stat-devices").textContent = latest.num_devices.toLocaleString();
        document.getElementById("stat-sessions").textContent = latest.num_sessions.toLocaleString();
        document.getElementById("stat-events").textContent = totalEvents.toLocaleString();
        document.getElementById("stats").hidden = false;
      }

      function renderChart(rows) {
        const labels = rows.map((r) => r.date);
        const gridColor = "rgba(255,255,255,0.06)";
        const tickColor = "#8b949e";

        new Chart(document.getElementById("chart"), {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                label: "Unique devices",
                data: rows.map((r) => r.num_devices),
                borderColor: COLORS.devices,
                backgroundColor: COLORS.devices,
                tension: 0.2,
                pointRadius: 2,
                borderWidth: 2,
              },
              {
                label: "Unique sessions",
                data: rows.map((r) => r.num_sessions),
                borderColor: COLORS.sessions,
                backgroundColor: COLORS.sessions,
                tension: 0.2,
                pointRadius: 2,
                borderWidth: 2,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            scales: {
              x: {
                type: "time",
                time: { unit: "day", tooltipFormat: "yyyy-MM-dd" },
                grid: { color: gridColor },
                ticks: { color: tickColor, maxRotation: 0, autoSkip: true },
              },
              y: {
                beginAtZero: true,
                grid: { color: gridColor },
                ticks: { color: tickColor, precision: 0 },
              },
            },
            plugins: {
              legend: { labels: { color: "#e6edf3" } },
              tooltip: {
                callbacks: {
                  afterBody: (items) => {
                    const row = rows[items[0].dataIndex];
                    return `Events: ${row.num_events.toLocaleString()}`;
                  },
                },
              },
            },
          },
        });
      }

      load();
    </script>
  </body>
</html>
