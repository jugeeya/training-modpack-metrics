; Minimal UE4SS-settings.ini for running the MatchLogger Lua mod in
; Rivals of Aether II with as little runtime overhead as possible.
;
; Baseline: the default UE4SS-settings.ini shipped with RE-UE4SS, with every
; feature the MatchLogger does not need turned off. Keys not present here fall
; back to UE4SS defaults, but the full file is kept so nothing is ambiguous.
;
; Lines marked "KEEP" are load-bearing for the MatchLogger — see the README
; before changing them.

[Overrides]
ModsFolderPath =
ControllingModsTxt =

[General]
; Hot reload (CTRL+R) is a keybind check only, but minimal means off.
; Turn it back on temporarily when iterating on the mod.
EnableHotReloadSystem = 0
HotReloadKey = R

; File watcher on the Scripts directory — off (this is also the default).
EnableAutoReloadingLuaMods = 0

; AOB scan cache. Only affects startup time (faster), not runtime. Keep on.
UseCache = 1
InvalidateCacheIfDLLDiffers = 1
SecondsToScanBeforeGivingUp = 30

; KEEP (true): maintains a fast lookup cache for the object array.
; FindFirstOf / FindAllOf / StaticFindObject in the MatchLogger are much
; cheaper with this on. The create/delete listeners it installs are cheap.
; Only try 'false' if you see a crash on startup, and re-measure afterwards.
bUseUObjectArrayCache = true

DoEarlyScan = 0
bEnableSeachByMemoryAddress = false

; KEEP (EngineTick) if the MatchLogger calls ExecuteInGameThread():
; EngineTick runs queued work once per frame via the HookEngineTick hook
; below. The alternative (ProcessEvent) would force HookUObjectProcessEvent
; on, which wraps EVERY UFunction call in the game — much more expensive.
DefaultExecuteInGameThreadMethod = EngineTick

DefaultFNameToStringMethod = Scan

[EngineVersionOverride]
MajorVersion =
MinorVersion =
DebugBuild =

[ObjectDumper]
LoadAllAssetsBeforeDumpingObjects = 0
UseModuleOffsets = 0

[CXXHeaderGenerator]
DumpOffsetsAndSizes = 1
KeepMemoryLayout = 0
LoadAllAssetsBeforeGeneratingCXXHeaders = 0

[UHTHeaderGenerator]
IgnoreAllCoreEngineModules = 0
IgnoreEngineAndCoreUObject = 0
MakeAllFunctionsBlueprintCallable = 1
MakeAllPropertyBlueprintsReadWrite = 1
MakeEnumClassesBlueprintType = 1
MakeAllConfigsEngineConfig = 1

[Debug]
; The #1 lag source, and the one that grows over time: both consoles keep an
; ever-growing in-memory log buffer, and the GUI console runs its own imgui
; render loop on a separate thread even while the window is hidden
; (GuiConsoleVisible only hides it; GuiConsoleEnabled=0 removes it).
; Renaming DLLs is NOT the way to get rid of the console — these three
; switches are.
ConsoleEnabled = 0
GuiConsoleEnabled = 0
GuiConsoleVisible = 0
GuiConsoleFontScaling = 1
GraphicsAPI = opengl
RenderMode = ExternalThread

[Threads]
; Signature scanning happens once at startup; these do not affect gameplay.
SigScannerNumThreads = 8
SigScannerMultithreadingModuleSizeThreshold = 16777216

[Memory]
MaxMemoryUsageDuringAssetLoading = 85

[Hooks]
; Every enabled hook here detours a hot engine function and pays a dispatch
; cost on EVERY call to it, whether or not any mod uses it. This section is
; where most of the per-frame overhead lives, so everything is off except
; what the MatchLogger's Lua API calls actually route through.

; KEEP both = 1: RegisterHook() on a Blueprint/script function (anything
; whose body is implemented in Blueprint, i.e. most of Rivals 2's game flow)
; is dispatched through these. On UE5 (>= 4.22) UE4SS uses
; ProcessLocalScriptFunction; ProcessInternal is its pre-4.22 counterpart and
; is also used to identify script functions, so leave both enabled.
; NOTE: RegisterHook() on a NATIVE function (C++-implemented, e.g. most
; functions under /Script/Engine) does NOT need these — it patches the
; function directly. If the MatchLogger only hooks native functions, set both
; to 0 for the single biggest win in a Blueprint-heavy game.
HookProcessInternal = 1
HookProcessLocalScriptFunction = 1

; Only needed by RegisterInitGameStatePreHook/PostHook.
HookInitGameState = 0

; Only needed by RegisterLoadMapPreHook/PostHook.
HookLoadMap = 0

; Only needed for UE4SS custom console commands (ConsoleCommandsMod etc.).
HookCallFunctionByNameWithArguments = 0

; Only needed by RegisterBeginPlayPreHook/PostHook. RegisterHook() on the
; Blueprint event ReceiveBeginPlay does NOT need this — that goes through the
; script hooks above.
HookBeginPlay  = 0
HookEndPlay  = 0

; Only needed for console cheats/commands via the local player exec path.
HookLocalPlayerExec = 0

; Fires for every ticking actor, every frame. Nothing in a passive stats
; logger needs it.
HookAActorTick = 0

; KEEP = 1 only because ExecuteInGameThread() (EngineTick method above)
; drains its queue from this hook, and the GUI console's EngineTick render
; mode would too. One cheap check per engine tick. If the MatchLogger never
; calls ExecuteInGameThread(), set this to 0 as well.
HookEngineTick = 1
EngineTickResolveMethod = Scan

; Per-frame viewport tick hook; only needed for RenderMode=GameViewportClientTick.
HookGameViewportClientTick = 0

; Wraps EVERY UFunction call in the game — the most expensive hook in this
; file. Only needed by RegisterProcessEventPreHook/PostHook or the
; ProcessEvent ExecuteInGameThread method. Keep off.
HookUObjectProcessEvent = 0

; Only needed by RegisterConsoleCommandHandler / RegisterConsoleCommandGlobalHandler
; and RegisterProcessConsoleExecPreHook. If the MatchLogger exposes console
; commands, set this back to 1.
HookProcessConsoleExec = 0

; Used by dumpers/generators when structs are (re)linked. Not needed at runtime.
HookUStructLink = 0

FExecVTableOffsetInLocalPlayer = 0x28

[CrashDump]
; Crash dumps are useful when debugging the mod; off for the minimal profile.
EnableDumping = 0
FullMemoryDump = 0

[ExperimentalFeatures]
